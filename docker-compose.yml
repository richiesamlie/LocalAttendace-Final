services:
  teacher-assistant:
    build: .
    container_name: teacher-assistant
    restart: unless-stopped

    # F-029: explicit user binding to match the nodejs user (UID 1001)
    # created in the Dockerfile. Without this, docker-compose would
    # default to running as root and the USER directive in the
    # Dockerfile would still apply inside the container, but file
    # permissions on bind-mounted volumes could be problematic.
    user: "1001:1001"

    # F-029: defense-in-depth container restrictions
    security_opt:
      - no-new-privileges:true  # Prevent SUID/SGID bit escalation
    read_only: false  # Set to true once /tmp + /app/data are tmpfs mounts

    # F-029: drop ALL Linux capabilities; we don't need any of them for
    # a Node.js HTTP server. Can re-add specific caps here if needed
    # (e.g., NET_BIND_SERVICE to bind port 80 without setcap).
    cap_drop:
      - ALL

    # F-029: resource limits to prevent DoS / fork-bomb scenarios
    deploy:
      resources:
        limits:
          cpus: '1.0'        # at most 1 full CPU core
          memory: 512M        # hard cap at 512MB RAM
          pids: 100           # max 100 processes (fork-bomb mitigation)
        reservations:
          cpus: '0.25'       # guaranteed 0.25 CPU
          memory: 128M       # guaranteed 128MB

    # F-029: graceful shutdown — give container 30s to clean up before SIGKILL
    stop_grace_period: 30s

    ports:
      - "3000:3000"

    # F-029: use a NAMED volume for /app/data instead of a bind mount.
    # Named volumes are managed by Docker and survive host filesystem
    # changes; bind mounts can be accidentally deleted/rotated.
    volumes:
      - teacher-assistant-data:/app/data
      # backups/ stays on a tmpfs inside the container — backup files
      # are short-lived and we don't want them to fill the host fs.
      - type: tmpfs
        target: /app/backups
        tmpfs:
          size: 100M

    env_file:
      - .env

    environment:
      - DB_FILE=/app/data/database.sqlite
      - NODE_ENV=production

    # F-029: healthcheck uses node (already in image) rather than wget
    # (which would require installing busybox-extras in alpine).
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# F-029: named volume declaration (was previously a bind mount on
# ./data). Defined at the top level so docker-compose manages it.
volumes:
  teacher-assistant-data:
