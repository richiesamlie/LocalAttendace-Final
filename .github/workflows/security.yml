name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (prod deps only, blocking at high)
        run: npm audit --omit=dev --audit-level=high

      - name: Generate full audit report (including dev deps, non-blocking)
        if: always()
        run: |
          npm audit --json > npm-audit.json || true
          echo "Audit report generated"

      - name: Surface audit failures in job summary
        if: failure()
        run: |
          echo "## ❌ Dependency audit gate FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production dependency audit found vulnerabilities at HIGH or CRITICAL severity." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Required action:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the full audit report in the \`npm-audit-report\` artifact." >> $GITHUB_STEP_SUMMARY
          echo "2. Run \`npm audit --omit=dev\` locally to see all HIGH/CRITICAL findings." >> $GITHUB_STEP_SUMMARY
          echo "3. Apply non-breaking fixes: \`npm audit fix\`. For breaking fixes, pin explicitly or upgrade in a separate PR." >> $GITHUB_STEP_SUMMARY
          echo "4. If a vulnerability has no upstream fix, add compensating controls + temporary acceptance note in SECURITY_RESIDUAL_RISK_REGISTER.md." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Do NOT** bypass this gate by adding \`continue-on-error: true\` to the audit step." >> $GITHUB_STEP_SUMMARY

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit.json

  bun-security-smoke:
    name: Bun Security Smoke (develop, blocking)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (Bun lockfile)
        run: bun install --frozen-lockfile

      - name: Run Bun audit (prod deps only, blocking at high)
        run: bun audit --audit-level=high

      - name: Generate Bun audit report (including dev deps, non-blocking artifact)
        if: always()
        run: |
          bun audit --json > bun-audit.json || true
          echo "Bun audit report generated"

      - name: Surface Bun audit failures in job summary
        if: failure()
        run: |
          echo "## ❌ Bun dependency audit gate FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Bun audit found HIGH or CRITICAL severity vulnerabilities in the dependency tree." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Required action:** same as npm audit gate above. Check \`bun-audit-report\` artifact." >> $GITHUB_STEP_SUMMARY

      - name: Upload Bun audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bun-audit-report
          path: bun-audit.json


  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript-typescript'
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4