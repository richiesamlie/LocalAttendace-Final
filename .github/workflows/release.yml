name: Automated Release

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Set Version
        id: version
        # This generates a version like v1.0.1, v1.0.2 based on the GitHub run number
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create Zip Archive
        run: |
          # Create a zip file containing the entire repository
          # Exclude the .git folder and node_modules (since node_modules is OS-specific)
          zip -r LocalAttendance-${{ env.VERSION }}.zip . -x "*.git*" -x "node_modules/*"

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            **How to use:**
            1. Download the `LocalAttendance-${{ env.VERSION }}.zip` file below.
            2. Extract the folder to your computer.
            3. Run `setup-env.ps1` once (required) to generate `.env` with secure `JWT_SECRET` and `DEFAULT_ADMIN_PASSWORD`.
            4. Save the generated admin password shown in terminal.
            5. Double-click `start-app.bat` to run the app. (It will automatically install the required dependencies on the first run with Bun).
            
            If PowerShell execution is restricted, create `.env` manually from `.env.example` and fill required values before running `start-app.bat`.

            ---
            ### 📝 Changelog

          generateReleaseNotes: true
          prerelease: false
          makeLatest: true
          artifacts: "LocalAttendance-${{ env.VERSION }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}

