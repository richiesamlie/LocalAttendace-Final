name: Automated Release

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g npm@latest
          rm -rf node_modules package-lock.json
          npm install --include=optional --force

      - name: Build project
        run: npm run build

      - name: Set Version
        id: version
        # This generates a version like v1.0.1, v1.0.2 based on the GitHub run number
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create Zip Archive
        run: |
          # Create a zip file containing the entire repository
          # Exclude the .git folder and node_modules (since node_modules is OS-specific)
          zip -r LocalAttendance-${{ env.VERSION }}.zip . -x "*.git*" -x "node_modules/*"

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            Automated build generated from the latest commit.
            
            **How to use:**
            1. Download the `LocalAttendance-${{ env.VERSION }}.zip` file below.
            2. Extract the folder to your computer.
            3. Double-click `start-app.bat` to run the app. (It will automatically install the required dependencies on the first run).
          prerelease: false
          makeLatest: true
          artifacts: "LocalAttendance-${{ env.VERSION }}.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
