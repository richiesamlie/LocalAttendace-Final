name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

  bun-parity-smoke:
    name: Bun Parity Smoke (develop, blocking)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/develop'
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies (Bun lockfile)
        run: bun install --frozen-lockfile

      - name: Create .env file
        run: |
          echo "JWT_SECRET=ci_test_secret_$(openssl rand -hex 16)" > .env
          echo "DEFAULT_ADMIN_PASSWORD=ci_test_admin_password" >> .env

      - name: Bun lint
        run: bun run lint

      - name: Bun ESLint
        run: bun run lint:eslint -- --max-warnings=0

      - name: Bun critical tests
        env:
          DEFAULT_ADMIN_PASSWORD: ci_test_admin_password
        run: bun run test:critical

      - name: Bun build
        run: bun run build

  docs-link-check:
    name: Docs Link Check
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: npm ci

      - name: Validate docs links
        run: npm run lint:docs

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (strict)
        run: npm run lint:eslint -- --max-warnings=0

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "JWT_SECRET=ci_test_secret_$(openssl rand -hex 16)" > .env
          echo "DEFAULT_ADMIN_PASSWORD=ci_test_admin_password" >> .env

      - name: Build application
        run: npm run build

  test-critical:
    name: Critical Tests (develop fast gate)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "JWT_SECRET=ci_test_secret_$(openssl rand -hex 16)" > .env
          echo "DEFAULT_ADMIN_PASSWORD=ci_test_admin_password" >> .env

      - name: Run critical tests
        env:
          DEFAULT_ADMIN_PASSWORD: ci_test_admin_password
        run: npm run test:critical

  test-full:
    name: Full Test Suite (main/PR gate)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "JWT_SECRET=ci_test_secret_$(openssl rand -hex 16)" > .env
          echo "DEFAULT_ADMIN_PASSWORD=ci_test_admin_password" >> .env

      - name: Run full tests
        env:
          DEFAULT_ADMIN_PASSWORD: ci_test_admin_password
        run: npm run test

  coverage:
    name: Test Coverage (main baseline)
    runs-on: ubuntu-latest
    needs: test-full
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "JWT_SECRET=ci_test_secret_$(openssl rand -hex 16)" > .env
          echo "DEFAULT_ADMIN_PASSWORD=ci_test_admin_password" >> .env

      - name: Run coverage
        env:
          DEFAULT_ADMIN_PASSWORD: ci_test_admin_password
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
